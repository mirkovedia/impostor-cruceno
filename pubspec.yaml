name: impostor_cruceno
description: "Juego de deducción social con identidad cruceña"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  audioplayers: ^6.1.0
  vibration: ^2.0.0
  uuid: ^4.5.1
  share_plus: ^12.0.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/icons/
    - assets/sounds/
